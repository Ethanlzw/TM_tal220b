; Experimental data-acquisition firmware for TAL220B + HX711 on NUCLEO-G431RB.
; This project intentionally uses the same STM32 board and Arduino-core
; PlatformIO environment as the current project, so it can be built from
; VS Code/PlatformIO with minimal setup.

[env:nucleo_g431rb]
platform = ststm32
board = nucleo_g431rb
framework = arduino
monitor_speed = 115200
